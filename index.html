<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(-45deg, #fff1f2, #ffe4e6, #fce7f3, #ffffff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            color: #4a044e;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card-container { text-align: center; }
        .cake-container { 
            position: relative; 
            width: 250px; 
            height: 250px; 
            margin: 50px auto 30px auto; 
        }

        /* Drop down animation for pieces */
        @keyframes dropDown {
            0% { transform: translateY(-500px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .piece { animation: dropDown 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

        .plate { 
            width: 260px; 
            height: 12px; 
            background: #fff;
            border-radius: 10px; 
            position: absolute; 
            bottom: 10px; 
            left: -5px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            animation-delay: 0.1s;
        }

        .cake-layer {
            width: 220px;
            height: 40px;
            background: #9d7e6d; /* Lighter chocolate */
            position: absolute;
            left: 15px;
            border-radius: 5px;
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }

        .cake-bottom { bottom: 22px; animation-delay: 0.3s; }
        .cake-middle { bottom: 62px; animation-delay: 0.5s; }
        .cake-top { bottom: 102px; animation-delay: 0.7s; }

        .cream {
            width: 220px;
            height: 25px;
            background: #ffffff;
            position: absolute;
            bottom: 135px;
            left: 15px;
            border-radius: 10px 10px 0 0;
            z-index: 5;
            animation-delay: 0.9s;
        }

        .drip-container {
            position: absolute;
            width: 100%;
            height: 40px;
            bottom: -30px;
            left: 0;
            display: flex;
            justify-content: space-around;
        }

        .drip {
            width: 15px;
            height: 0;
            background: #ffffff;
            border-radius: 0 0 10px 10px;
            animation: dripDown 1.5s ease-out forwards;
            animation-delay: 1.5s;
        }

        @keyframes dripDown {
            0% { height: 0; }
            100% { height: 35px; }
        }

        .drip-2 { animation-duration: 2s; height: 45px; }
        .drip-3 { animation-duration: 1.8s; height: 30px; }

        .candle { 
            width: 10px; 
            height: 50px; 
            background: #fff;
            position: absolute; 
            bottom: 160px; 
            left: 120px; 
            border-radius: 3px; 
            z-index: 10;
            animation-delay: 1.2s;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .candle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 10px;
            background: #ffeb3b;
            top: 10px;
        }

        .flame { 
            width: 16px; 
            height: 24px; 
            background: radial-gradient(circle at center, #ffeb3b, #f97316);
            border-radius: 50% 50% 20% 20%; 
            position: absolute; 
            top: -26px; 
            left: -3px; 
            box-shadow: 0 0 15px #fbbf24, 0 0 30px #f59e0b; 
            animation: flicker 0.6s infinite alternate;
            opacity: 0;
            animation: flicker 0.6s infinite alternate, fadeInFlame 0.3s forwards;
            animation-delay: 2s, 2s;
        }

        @keyframes fadeInFlame {
            to { opacity: 1; }
        }

        @keyframes flicker { 
            0% { transform: scale(1) rotate(-1deg); } 
            100% { transform: scale(1.15) rotate(2deg); } 
        }
        #text { 
            font-family: 'Dancing Script', cursive; 
            color: #be123c; 
            font-size: 3.5em; 
            font-weight: 700; 
            text-shadow: 2px 2px 8px rgba(190, 18, 60, 0.1); 
            min-height: 1.2em; 
            margin-top: 20px;
            animation: fadeIn 2s ease-in both;
            animation-delay: 1.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            #text {
                font-size: 2.2em;
                padding: 0 15px;
            }
            .cake-container {
                transform: scale(0.8);
                margin-bottom: 0px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="cake-container">
            <div class="candle piece"><div class="flame"></div></div>
            <div class="cream piece">
                <div class="drip-container">
                    <div class="drip drip-1"></div>
                    <div class="drip drip-2"></div>
                    <div class="drip drip-3"></div>
                </div>
            </div>
            <div class="cake-layer cake-top piece"></div>
            <div class="cake-layer cake-middle piece"></div>
            <div class="cake-layer cake-bottom piece"></div>
            <div class="plate piece"></div>
        </div>
        <h1 id="text"></h1>
    </div>
    <script>
        const textToType = "Happy 24th Birthday My Friend! ❤️";
        let index = 0;
        function typeWriter() {
            if (index < textToType.length) {
                document.getElementById("text").innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeWriter, 100);
            }
        }
        window.onload = function() { setTimeout(typeWriter, 500); };
    </script>
</body>
</html>
